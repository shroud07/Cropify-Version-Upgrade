{% extends 'layout.html' %} 

{% block body %}
<div class="max-w-2xl mx-auto py-20 animate-fade-in-up text-center">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-emerald-100 dark:border-emerald-900/50 p-10 overflow-hidden relative">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-emerald-500/10 rounded-full blur-2xl pointer-events-none"></div>
        
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-500 mb-6 shadow-inner">
            <i class="ph ph-check-circle text-4xl"></i>
        </div>
        
        <h2 class="text-gray-500 dark:text-gray-400 text-lg font-medium mb-2">AI Recommendation:</h2>
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 dark:text-white mb-8">
            You should grow <br>
            <span class="bg-gradient-to-r from-emerald-500 to-teal-400 text-gradient capitalize">{{ prediction }}</span>
        </h1>
        
        <a href="{{ url_for('crop_recommend') }}" class="inline-flex items-center gap-2 text-emerald-600 dark:text-emerald-400 font-semibold hover:underline">
            <i class="ph ph-arrow-left"></i> Check another farm
        </a>
    </div>
</div>
{% endblock %}
