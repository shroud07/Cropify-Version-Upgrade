{% extends 'layout.html' %} 

{% block body %}
<div class="max-w-3xl mx-auto py-12 animate-fade-in-up">
    
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-500 mb-4 shadow-sm">
            <i class="ph ph-plant text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">Crop Recommender</h2>
        <p class="mt-3 text-gray-500 dark:text-gray-400">Find out the most suitable crop to grow based on soil and weather data.</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-700 p-8 md:p-10">
        
        <form method="POST" action="{{ url_for('crop_prediction') }}" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-2">
                    <label for="Nitrogen" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Nitrogen (N)</label>
                    <input type="number" id="Nitrogen" name="nitrogen" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow"
                        placeholder="e.g. 50" />
                </div>
                <div class="space-y-2">
                    <label for="Phosphorous" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Phosphorous (P)</label>
                    <input type="number" id="Phosphorous" name="phosphorous" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow"
                        placeholder="e.g. 50" />
                </div>
                <div class="space-y-2">
                    <label for="Pottasium" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Potassium (K)</label>
                    <input type="number" id="Pottasium" name="pottasium" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow"
                        placeholder="e.g. 50" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="ph" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Soil pH Level</label>
                    <input type="number" step="0.01" id="ph" name="ph" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow"
                        placeholder="e.g. 6.5" />
                </div>
                <div class="space-y-2">
                    <label for="Rainfall" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Rainfall (in mm)</label>
                    <input type="number" step="0.01" id="Rainfall" name="rainfall" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow"
                        placeholder="e.g. 200.5" />
                </div>
            </div>

            <hr class="border-gray-100 dark:border-gray-700 my-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="sts" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">State</label>
                    <select onchange="print_city('state', this.selectedIndex);" id="sts" name="stt" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
                    </select>
                </div>
                <div class="space-y-2">
                    <label for="state" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">City</label>
                    <select id="state" name="city" required
                        class="block w-full px-4 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
                    </select>
                </div>
            </div>

            <script src="{{ url_for('static', filename='scripts/cities.js') }}"></script>
            <script>
                // We use DOMContentLoaded to ensure the HTML elements exist before the script fires
                document.addEventListener("DOMContentLoaded", function() {
                    if (typeof print_state === "function") {
                        print_state("sts");
                    }
                });
            </script>

            <div class="pt-6">
                <button type="submit" class="w-full flex items-center justify-center gap-2 py-4 px-8 border border-transparent rounded-xl shadow-lg text-lg font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all hover:-translate-y-0.5">
                    <i class="ph ph-sparkle"></i> Predict Best Crop
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
