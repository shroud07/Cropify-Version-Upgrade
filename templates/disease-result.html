{% extends 'layout.html' %} 

{% block body %}
<div class="max-w-4xl mx-auto py-16 animate-fade-in-up">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-red-100 dark:border-red-900/50 p-10">
        
        <div class="flex items-center gap-4 border-b border-gray-100 dark:border-gray-700 pb-6 mb-6">
            <div class="w-14 h-14 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 flex items-center justify-center shrink-0">
                <i class="ph ph-warning-circle text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Disease Diagnosis Report</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Generated by Deep Learning Vision Model</p>
            </div>
        </div>

        <div class="prose prose-red dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 leading-relaxed text-lg">
            {{ prediction }}
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-100 dark:border-gray-700">
            <a href="{{ url_for('disease_prediction') }}" class="inline-flex items-center gap-2 text-red-600 dark:text-red-400 font-semibold hover:underline">
                <i class="ph ph-arrow-left"></i> Scan another plant
            </a>
        </div>
    </div>
</div>
{% endblock %}
