{% extends 'layout.html' %} 

{% block body %}
<div class="max-w-2xl mx-auto py-12 animate-fade-in-up">
    
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 mb-4 shadow-sm">
            <i class="ph ph-bug text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">Disease Detection AI</h2>
        <p class="mt-3 text-gray-500 dark:text-gray-400">Upload a clear photo of the affected plant leaf to get an instant diagnosis and cure.</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-700 p-8 md:p-10">
        <form method="post" enctype="multipart/form-data" class="space-y-8 text-center">
            
            <div class="relative group cursor-pointer">
                <input type="file" name="file" id="inputfile" accept="image/*" onchange="preview_image(event)" required
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div id="dropzone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-10 bg-gray-50 dark:bg-gray-900 group-hover:bg-emerald-50 dark:group-hover:bg-emerald-900/20 group-hover:border-emerald-500 transition-all">
                    
                    <img id="output-image" class="hidden mx-auto rounded-xl shadow-md max-h-64 object-cover mb-4" />
                    
                    <div id="upload-placeholder">
                        <i class="ph ph-upload-simple text-4xl text-gray-400 dark:text-gray-500 mb-3 block"></i>
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Click or drag image here</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Supports JPG, PNG, JPEG</p>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full flex items-center justify-center gap-2 py-4 px-8 border border-transparent rounded-xl shadow-lg text-lg font-bold text-white bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all hover:-translate-y-0.5">
                <i class="ph ph-scan"></i> Analyze Leaf
            </button>
        </form>
    </div>
</div>

<script>
    function preview_image(event) {
        var reader = new FileReader();
        reader.onload = function() {
            var output = document.getElementById('output-image');
            var placeholder = document.getElementById('upload-placeholder');
            output.src = reader.result;
            output.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
