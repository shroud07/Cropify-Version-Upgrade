{% extends 'layout.html' %} 

{% block body %}
<div class="max-w-3xl mx-auto py-16 animate-fade-in-up">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-blue-100 dark:border-blue-900/50 p-10">
        
        <div class="flex items-center gap-4 border-b border-gray-100 dark:border-gray-700 pb-6 mb-6">
            <div class="w-14 h-14 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-500 flex items-center justify-center shrink-0">
                <i class="ph ph-flask text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Fertilizer Insights</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Based on your soil parameters</p>
            </div>
        </div>

        <div class="prose prose-emerald dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 leading-relaxed text-lg">
            {{ recommendation }}
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-100 dark:border-gray-700">
            <a href="{{ url_for('fertilizer_recommendation') }}" class="inline-flex items-center gap-2 text-blue-600 dark:text-blue-400 font-semibold hover:underline">
                <i class="ph ph-arrow-left"></i> Analyze another sample
            </a>
        </div>
    </div>
</div>
{% endblock %}
