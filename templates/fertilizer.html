{% extends 'layout.html' %} 

{% block body %}
<style>
/* Hide number input arrows in Chrome, Edge, Safari */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Hide number input arrows in Firefox */
input[type="number"] {
    -moz-appearance: textfield;
}
</style>
<div class="max-w-2xl mx-auto py-12 animate-fade-in-up">
    
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-500 mb-4 shadow-sm">
            <i class="ph ph-flask text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">Fertilizer Intelligence</h2>
        <p class="mt-3 text-gray-500 dark:text-gray-400">Input your soil nutrient metrics to receive personalized fertilizer recommendations.</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-700 p-8 md:p-10">
        
        <form method="POST" action="{{ url_for('fert_recommend') }}" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="space-y-2">
                    <label for="Nitrogen" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
                        Nitrogen (N)
                    </label>
                    <div class="relative">
                        <input type="number" id="Nitrogen" name="nitrogen" required
                            class="block w-full pl-4 pr-10 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow outline-none placeholder-gray-400"
                            placeholder="e.g. 50" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400 font-medium">
                            mg/kg
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="Phosphorous" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
                        Phosphorous (P)
                    </label>
                    <div class="relative">
                        <input type="number" id="Phosphorous" name="phosphorous" required
                            class="block w-full pl-4 pr-10 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow outline-none placeholder-gray-400"
                            placeholder="e.g. 50" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400 font-medium">
                            mg/kg
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="Pottasium" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
                        Potassium (K)
                    </label>
                    <div class="relative">
                        <input type="number" id="Pottasium" name="pottasium" required
                            class="block w-full pl-4 pr-10 py-3 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow outline-none placeholder-gray-400"
                            placeholder="e.g. 50" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400 font-medium">
                            mg/kg
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-gray-100 dark:border-gray-700 my-8">

            <div class="space-y-2">
                <label for="crop" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
                    Target Crop to Grow
                </label>
                <div class="relative">
                    <select name="cropname" id="crop" required
                        class="appearance-none block w-full pl-4 pr-10 py-4 text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow outline-none cursor-pointer">
                        <option value="" disabled selected>Select a target crop...</option>
                        <option value="rice">Rice</option>
                        <option value="maize">Maize</option>
                        <option value="chickpea">Chickpea</option>
                        <option value="kidneybeans">Kidney Beans</option>
                        <option value="pigeonpeas">Pigeon Peas</option>
                        <option value="mothbeans">Moth Beans</option>
                        <option value="mungbean">Mung Bean</option>
                        <option value="blackgram">Black Gram</option>
                        <option value="lentil">Lentil</option>
                        <option value="pomegranate">Pomegranate</option>
                        <option value="banana">Banana</option>
                        <option value="mango">Mango</option>
                        <option value="grapes">Grapes</option>
                        <option value="watermelon">Watermelon</option>
                        <option value="muskmelon">Muskmelon</option>
                        <option value="apple">Apple</option>
                        <option value="orange">Orange</option>
                        <option value="papaya">Papaya</option>
                        <option value="coconut">Coconut</option>
                        <option value="cotton">Cotton</option>
                        <option value="jute">Jute</option>
                        <option value="coffee">Coffee</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-500">
                        <i class="ph ph-caret-down"></i>
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full flex items-center justify-center gap-2 py-4 px-8 border border-transparent rounded-xl shadow-lg text-lg font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all hover:-translate-y-0.5">
                    <i class="ph ph-cpu"></i> Generate AI Recommendation
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
